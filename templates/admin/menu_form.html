
{% extends "base.html" %}
{% block title %}{{ 'Редагування страви' if dish else 'Додавання страви' }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card soft-card p-4">
            <h1 class="mb-4">{{ 'Редагування страви' if dish else 'Додавання страви' }}</h1>
            <form method="post" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Назва</label>
                        <input class="form-control" type="text" name="name" value="{{ dish.name if dish else '' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Категорія</label>
                        <input class="form-control" type="text" name="category" value="{{ dish.category if dish else 'Основні страви' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Вага</label>
                        <input class="form-control" type="text" name="weight" value="{{ dish.weight if dish else '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Ціна</label>
                        <input class="form-control" type="number" min="0" name="price" value="{{ dish.price if dish else '' }}" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Інгредієнти</label>
                        <textarea class="form-control" name="ingredients" rows="3">{{ dish.ingredients if dish else '' }}</textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Опис</label>
                        <textarea class="form-control" name="description" rows="4">{{ dish.description if dish else '' }}</textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Зображення</label>
                        <input class="form-control" type="file" name="image" accept=".png,.jpg,.jpeg,.webp">
                    </div>
                    <div class="col-md-6 form-check ms-2">
                        <input class="form-check-input" type="checkbox" name="active" id="active" {% if not dish or dish.active %}checked{% endif %}>
                        <label class="form-check-label" for="active">Активна позиція</label>
                    </div>
                    <div class="col-md-6 form-check ms-2">
                        <input class="form-check-input" type="checkbox" name="is_featured" id="is_featured" {% if dish and dish.is_featured %}checked{% endif %}>
                        <label class="form-check-label" for="is_featured">Рекомендована</label>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button class="btn btn-primary">{{ 'Зберегти зміни' if dish else 'Додати страву' }}</button>
                    <a class="btn btn-outline-light" href="{{ url_for('admin_menu') }}">Назад</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
